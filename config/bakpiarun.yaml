server:
  host: "0.0.0.0"
  port: 8080
  https_port: 8443
  admin_token: "dev-token-for-local-testing"
  tls:
    enabled: false
    cert_path: "/app/certs/cert.pem"
    key_path: "/app/certs/key.pem"

php:
  docroot: "/app/public"
  worker_path: "/app/src-worker/worker.php"
  worker_count: 32
  memory_limit_mb: 128
  max_requests: 5000
  timeout_ms: 30000
  connection_pool_size: 5

socket:
  directory: "/tmp/bakpiarun"

logging:
  access_log_enabled: true
  access_log: "/app/logs/access.log"
  
  error_log_enabled: true
  error_log: "/app/logs/error.log"
  
  level: "info"  # debug, info, warn, error
  file: "/app/logs/bakpiarun.log"

rate_limit:
  enabled: false
  requests_per_minute: 120
  burst_size: 20

security:
  # Prevent clickjacking (DENY, SAMEORIGIN, atau ALLOW-FROM uri)
  x_frame_options: "DENY"
  
  # Prevent MIME type sniffing
  x_content_type_options: true
  
  # Enable XSS filter
  x_xss_protection: true
  
  # Content Security Policy (optional, uncomment to enable)
  # content_security_policy: "default-src 'self'; script-src 'self' 'unsafe-inline'"
  
  # HTTP Strict Transport Security (optional, untuk HTTPS)
  # strict_transport_security: "max-age=31536000; includeSubDomains"
  
  # Control referrer information
  referrer_policy: "strict-origin-when-cross-origin"
  
  # Control browser features (optional)
  # permissions_policy: "geolocation=(), microphone=(), camera=()"

compression:
  enabled: true
  min_size_bytes: 1024  # Hanya compress response > 1KB
  level: 6  # 1-9 (6 = balanced)

pools:
  # HEAVY POOL DULU (lebih spesifik)
  - name: "heavy"
    worker_count: 8
    memory_limit_mb: 512
    max_requests: 100
    timeout_ms: 300000
    patterns:
      - "/heavy-db.php"
      - "/heavy-*"
      - "/api/export/*"
      - "/api/report/*"
  
  # FAST POOL TERAKHIR (catch all)
  - name: "fast"
    worker_count: 32
    memory_limit_mb: 128
    max_requests: 5000
    timeout_ms: 30000
    patterns:
      - "/*"  # Default: semua request yang gak match heavy


# Queue System Configuration
queue:
  enabled: false        # Set to false to disable queue system
  max_jobs: 10000      # Maximum jobs in queue (prevent memory overflow)



